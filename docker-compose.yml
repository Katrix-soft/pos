services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: katrix-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-katrix_secret_key_change_me}
      DB_PATH: /data/katrix.db
    volumes:
      - katrix_data:/data
    networks:
      - npm_network
    # No exponemos el puerto al host — el frontend nginx lo accede internamente

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: katrix-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - npm_network
    # Caddy-proxy enruta el dominio a este contenedor por nombre

volumes:
  katrix_data:
    driver: local

networks:
  npm_network:
    external: true   # Red ya creada por caddy-proxy / Nginx Proxy Manager
