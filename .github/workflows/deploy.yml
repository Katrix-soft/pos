name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Katrix POS
    runs-on: ubuntu-latest

    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }} # Opcional si la llave no tiene clave
          script: |
            # Entramos a la carpeta del proyecto en el servidor
            cd /ruta/hacia/tu/proyecto/mvp-ropa
            
            # Trae los cambios más recientes que acabas de pushear a main
            git pull origin main
            
            # Recompila y levanta los servicios usando Docker Compose
            docker-compose up -d --build
